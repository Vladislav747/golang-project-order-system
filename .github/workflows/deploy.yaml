name: Deploy App

on:
  push:
    branches:
      - master
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m
          cache: true

  build:
    name: Test build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -v ./cmd/order-service

  unittest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go test ./... -v

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go test ./... -v -tags=integration

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [lint, build, unittest, integration-tests]
    if: github.event_name == 'workflow_dispatch'

    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "Test deploy from release branch"
          fi

      - name: Validate deploy secrets
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_PATH}" ]; then
            echo "Set DEPLOY_HOST and DEPLOY_PATH in GitHub Secrets"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "Set DEPLOY_SSH_KEY in GitHub Secrets"
            exit 1
          fi

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary in CI
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o order-service ./cmd/order-service
          chmod +x order-service
          file order-service

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.idea' \
            ./ "${DEPLOY_USER:-root}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Build and restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${DEPLOY_USER:-root}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && docker compose -f docker-compose.prod.yml up -d --build"

      - name: Show running containers
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${DEPLOY_USER:-root}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && docker compose -f docker-compose.prod.yml ps"
